services:
  unitree_ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /ros2_ws/data
    environment:
      - ROBOT_IP=${ROBOT_IP}
      - CONN_TYPE=${CONN_TYPE:-webrtc}
      - WEBRTC_SERVER_HOST=0.0.0.0  # Listen on all interfaces
      - WEBRTC_SERVER_PORT=${WEBRTC_SERVER_PORT:-9991}
      - DISPLAY=${DISPLAY:-}  # For GUI applications like rviz2
      # Persistent data paths (mounted at ./data on the host)
      - DATA_DIR=/ros2_ws/data
      - MAP_NAME=${MAP_NAME:-my_map}
      - MAP_SAVE=${MAP_SAVE:-false}
      - MAP_FILE=${MAP_FILE:-/ros2_ws/data/my_map.yaml}
      - WEB_UI_PORT=${WEB_UI_PORT:-8080}
      - WEB_DEV_PORT=${WEB_DEV_PORT:-5173}
      - ROSBRIDGE_PORT=${ROSBRIDGE_PORT:-9090}
      # Mounted workspace path for Vite dev / web_dev:=true (see docker/README.md)
      - GO2_DASHBOARD_WEB_SRC=/ros2_ws/src/go2_dashboard/web
    volumes:
      - ../:/ros2_ws/src  # live-mount workspace source (edit on host, rebuild in container)
      - ./data:/ros2_ws/data  # SLAM maps (.yaml/.pgm/.data/.posegraph), LiDAR dumps (.ply)
      - /tmp/.X11-unix:/tmp/.X11-unix  # X11 forwarding
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
    network_mode: "host"  # Required for ROS2 discovery and robot communication
    privileged: true  # Required for hardware access
    devices:
      - /dev/input:/dev/input  # For joystick access
    restart: unless-stopped
